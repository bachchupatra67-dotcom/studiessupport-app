<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Newspaper | India Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Source+Serif+4:wght@400;700&display=swap');
        body { font-family: 'Source Serif 4', serif; }
        .newspaper-title { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#fcfaf5] text-stone-900">
    <div class="bg-red-700 text-white py-2 overflow-hidden whitespace-nowrap border-b border-black">
        <div class="inline-block animate-marquee uppercase font-bold text-sm tracking-widest">
            Breaking: Live Updates from across Bharat • Digital India Initiative expands • Sensex reaches new highs • 
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <header class="text-center border-b-4 border-double border-stone-800 pb-4 mb-8">
            <h1 class="newspaper-title text-6xl md:text-8xl font-black uppercase tracking-tighter">LATEST NEWSPAPER</h1>
            <div class="flex justify-between mt-4 font-bold text-xs uppercase border-t border-stone-300 pt-2 italic">
                <span>New Delhi // Mumbai // Bengaluru</span>
                <span id="current-date"></span>
                <span>Edition: Digital India</span>
            </div>
        </header>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <div class="col-span-full text-center py-20 text-stone-400 italic">Gathering the latest headlines...</div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
